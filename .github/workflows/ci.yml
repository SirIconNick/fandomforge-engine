name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tools (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install package
        working-directory: tools
        run: |
          uv venv --python 3.13 .venv
          uv pip install --python .venv/bin/python Cython
          uv pip install --python .venv/bin/python --no-build-isolation -e ".[dev]"

      - name: Run lint
        working-directory: tools
        run: .venv/bin/ruff check fandomforge tests
        continue-on-error: true

      - name: Run type-check
        working-directory: tools
        run: .venv/bin/mypy fandomforge
        continue-on-error: true

      - name: Run deterministic tests
        working-directory: tools
        run: |
          .venv/bin/python -m pytest \
            tests/test_schema_validation.py \
            tests/test_qa_gate.py \
            tests/test_export_projects.py \
            tests/test_config_loading.py \
            tests/test_beat.py \
            tests/test_ingest.py \
            -q

  web-typecheck:
    name: Next.js dashboard (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Type-check
        working-directory: web
        run: pnpm tsc --noEmit

      - name: Unit tests (vitest)
        working-directory: web
        run: pnpm test

  web-e2e:
    name: Next.js dashboard (playwright e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: web
        run: pnpm test:e2e
        env:
          CI: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
