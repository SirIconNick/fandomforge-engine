# Phase 0.5.2 corpus expansion config — generated 2026-04-20.
# Source: user-provided URLs in plan cataloged-and-ready-mossy-bear.md
#
# Per-bucket structure:
#   buckets.<edit_type>.playlists  — full playlist URLs, top-N per playlist
#   buckets.<edit_type>.singles    — individual video URLs, all under <edit_type>-singles
#
# After validate pass, mixed_unclassified entries get re-bucketed based on
# the auto-suggest pass (title keyword analysis) + user confirm.

schema_version: 1
defaults:
  max_videos_per_playlist: 30
  max_height: 480
  download: false  # safety dry-run by default; --apply on ingest-batch flips this

buckets:
  dance:
    description: "Dance / movement multifandom — K-pop fancam, choreography matching"
    playlists: []
    singles:
      - https://www.youtube.com/watch?v=287LolDpfcU
      - https://www.youtube.com/watch?v=-yHCeSZ-Nik
      - https://www.youtube.com/watch?v=ETMk4m-_7A0
      - https://www.youtube.com/watch?v=00ezoTnw1HM

  sad:
    description: "Sad / emotional multifandom — grief, loss, restraint-prioritized"
    playlists:
      - https://www.youtube.com/playlist?list=PL1xSxjuOQA3PjmXLhEWy2hTVwzBRidO4N
    singles:
      - https://www.youtube.com/watch?v=f4DpkLnBWKY
      - https://www.youtube.com/watch?v=polwiLRjX8k

  tribute_or_dialogue:
    description: "Character tribute or dialogue-narrative — needs validation pass to disambiguate"
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEw1rC-YCLZ1-P187cMowVaa
    singles: []

  action:
    description: "Additional action / fighting playlist — supplements existing action-pl1..5"
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEwpDpUDabKQ34uPHO6_bHIs
    singles: []

  mixed_unclassified:
    description: |
      User flagged 'could work for any' — validation pass auto-suggests a
      bucket per playlist via title keyword analysis. User confirms or
      reassigns. Held back from ingest until reclassified.
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEyg220h2i5vPfGk8Yw2rCQs
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEz7ryMqSAzqI_k53FjEm3lb
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEznJu1h5-8TMIbPB96lcx-w
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEzxhS9ToFAtrzYPHInL4oeG
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIExJenALBf-S1AZLK3Rvvzkd
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEysAax78R8Cn3ET3geUOkh4
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEwG35GCWfxsLHcazf53926A
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIExUYbCXStUJt3a7CQRMOnfA
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEwGth6zd-bV0cbZ-KosUagH
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEyTPymxJIChUUBD0hVprBs6
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEyRHrLbE_0Oz3a2rVVXPdEf
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEyR4b-OrZmtqUH3mVNT5NmJ
    singles:
      # YouTube radio — yt-dlp likely 404s. Default behavior: skip silently.
      - https://www.youtube.com/watch?v=uvrJ0oYoZJs

# Bucket → tag mapping. Tags use prefix that edit_type_for_tag() parses.
tag_naming:
  dance:               "dance-pl"
  sad:                 "sad-pl"
  tribute_or_dialogue: "tribute-pl"  # may flip to dialogue-pl after validation
  action:              "action-pl"   # appended to existing action-pl1..5 → pl6+
  dance_movement:      "dance-pl"
  sad_emotional:       "sad-pl"
  dialogue_narrative:  "dialogue-pl"
  tribute:             "tribute-pl"
  mixed_unclassified:  "mixed-pl"
