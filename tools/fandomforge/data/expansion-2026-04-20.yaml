# Phase 0.5.2 corpus expansion config — generated 2026-04-20.
# Source: user-provided URLs in plan cataloged-and-ready-mossy-bear.md
#
# Re-bucketed 2026-04-20 after validate pass. 4 playlists dropped as
# unfetchable (yt-dlp no entries — private/deleted/radio). 2 more dropped
# after content review: one trailer playlist moved to new hype_trailer
# bucket, talk-show/meme playlist removed entirely.
#
# Per-bucket structure:
#   buckets.<edit_type>.playlists  — full playlist URLs, top-N per playlist
#   buckets.<edit_type>.singles    — individual video URLs, all under <edit_type>-singles

schema_version: 1
defaults:
  max_videos_per_playlist: 30
  max_height: 480
  download: false  # safety dry-run by default; --apply on ingest-batch flips this

buckets:
  dance:
    description: "Dance / movement multifandom — K-pop fancam, choreography matching"
    playlists: []
    singles:
      - https://www.youtube.com/watch?v=287LolDpfcU  # Multifandom || HandClap
      - https://www.youtube.com/watch?v=-yHCeSZ-Nik  # Multifandom || Dancin
      - https://www.youtube.com/watch?v=ETMk4m-_7A0  # Multifandom | Dance Monkey
      - https://www.youtube.com/watch?v=00ezoTnw1HM  # Shut Up and Dance | Movie Compilation
      - https://www.youtube.com/watch?v=uvrJ0oYoZJs  # Dance Monkey // Multifandom (validated 1.4M views)

  sad:
    description: "Sad / emotional multifandom — grief, loss, restraint-prioritized"
    playlists:
      - https://www.youtube.com/playlist?list=PL1xSxjuOQA3PjmXLhEWy2hTVwzBRidO4N  # sad multifandom, confirmed
    singles:
      - https://www.youtube.com/watch?v=f4DpkLnBWKY  # I don't feel anything (Multifandom)
      - https://www.youtube.com/watch?v=polwiLRjX8k  # what is pain? | sad multifandom

  action:
    description: "Action / fighting multifandom — supplements existing action-pl1..5"
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEwpDpUDabKQ34uPHO6_bHIs  # confirmed action (Thor/Troy/Kingsman/Daredevil/John Wick)
      # REMOVED 2026-04-20: PL6z3IIDqsIExUYbCXStUJt3a7CQRMOnfA duplicates the
      # existing action-pl1 from the 148-video corpus — same playlist ingested
      # twice, would double-count ~15 videos in action priors. The new
      # idempotent tag-reuse in ingest-batch would catch this now; dedup
      # performed manually for the existing state.
    singles: []

  tribute:
    description: |
      Character-tribute and multifandom retrospective edits — character-
      spotlight content, show/movie retrospectives, "the grand story" type
      edits. Emotional-leaning but not pure grief (that's `sad`).
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEw1rC-YCLZ1-P187cMowVaa  # Bond 50 yrs / Supernatural grand story / multifandom mashups
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEz7ryMqSAzqI_k53FjEm3lb  # GoT Starks — Arya/Jon Snow character spotlights
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEznJu1h5-8TMIbPB96lcx-w  # Marvel character tributes — Tony/Steve/Thor
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIExJenALBf-S1AZLK3Rvvzkd  # Multifandom retrospectives — hero / never fall away / final cut
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEwGth6zd-bV0cbZ-KosUagH  # TWD character tributes — Rick/Daryl/Negan
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEyTPymxJIChUUBD0hVprBs6  # Supernatural / Dean Winchester character tributes
      # Rescue URLs supplied 2026-04-20 — the 3 playlists validate couldn't
      # fetch via `playlist?list=` form. Using watch?v=X&list=Y form which
      # yt-dlp handles as a playlist when list= is present.
      - https://www.youtube.com/watch?v=6dlKITHsGmE&list=PL6z3IIDqsIEyR4b-OrZmtqUH3mVNT5NmJ
      - https://www.youtube.com/watch?v=M5Bz3gT3iB0&list=PL6z3IIDqsIEwG35GCWfxsLHcazf53926A
      - https://www.youtube.com/watch?v=ZTeOw2FTGnA&list=PL6z3IIDqsIEyg220h2i5vPfGk8Yw2rCQs
    singles: []

  hype_trailer:
    description: |
      Hype-trailer style references — official movie trailers (Baby Driver,
      Infinity War, Spider-Man, Black Panther). Different editorial grammar
      from fan-edits — reveal-structured pacing, trailer beats. Kept
      separate so their priors don't contaminate action/tribute buckets.
    playlists:
      - https://www.youtube.com/playlist?list=PL6z3IIDqsIEzxhS9ToFAtrzYPHInL4oeG
    singles: []

# Bucket → tag-prefix mapping. The prefix must end in `-pl` so that
# ingest-batch can derive `<prefix>-singles` (trimmed) and `<prefix><N>`
# tags correctly. edit_type_for_tag() in reference_library.py parses
# the prefix via split('-')[0].
tag_naming:
  dance:        "dance-pl"
  sad:          "sad-pl"
  action:       "action-pl"   # appended to existing action-pl1..5 → pl6+
  tribute:      "tribute-pl"
  hype_trailer: "hype-pl"

